services:
  postgres:
    container_name: postgres_db
    image: postgres:18.3
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      PGDATA: ${PGDATA}
    networks:
      - internal
    ports:
      - "5432:5432"
    volumes:
      - postgres:${PGDATA}

networks:
  internal:
    driver: bridge


volumes:
  postgres: